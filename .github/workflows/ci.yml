name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    env:
      # Dummy local SQLite URL so Prisma client + next build resolve in CI.
      # No real queries run during the build (auth pages are dynamic).
      DATABASE_URL: "file:./ci.db"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up database (generate client + schema)
        run: npx prisma db push

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit
